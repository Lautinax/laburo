<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procesador de Pedidos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --tinta:        #1c2b2e;
    --tinta-suave:  #4d5e61;
    --hueso:        #f6f3ec;
    --panel:        #ffffff;
    --linea:        #dcd6c8;
    --acento:       #c4622d;
    --acento-suave: #f0e4d8;
    --ok:           #2f7d5e;
    --ok-bg:        #e7f3ec;
    --alerta:       #b8862a;
    --alerta-bg:    #faf0db;
    --critico:      #b3402f;
    --critico-bg:   #fbe9e4;
    --mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
  }

  *{box-sizing:border-box;}

  body{
    font-family: "Inter", -apple-system, "Segoe UI", sans-serif;
    background: var(--hueso);
    color: var(--tinta);
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    line-height: 1.5;
  }

  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom: 2px solid var(--tinta);
    padding-bottom: 18px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 8px;
  }

  h1{
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }

  .etiqueta-sistema{
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--tinta-suave);
  }

  .panel-entrada{
    background: var(--panel);
    border: 1px solid var(--linea);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .panel-entrada label{
    display:block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .panel-entrada .ayuda{
    font-size: 0.8rem;
    color: var(--tinta-suave);
    margin: -4px 0 12px;
  }

  textarea{
    width:100%;
    height:200px;
    font-family: var(--mono);
    font-size: 0.85rem;
    border: 1px solid var(--linea);
    border-radius: 3px;
    padding: 12px;
    resize: vertical;
    background: #fdfcf9;
    color: var(--tinta);
  }

  textarea:focus{
    outline: 2px solid var(--acento);
    outline-offset: 1px;
  }

  .acciones{
    display:flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  button{
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 3px;
    padding: 10px 18px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background-color .15s ease, border-color .15s ease;
  }

  button:focus-visible{
    outline: 2px solid var(--acento);
    outline-offset: 2px;
  }

  .btn-primario{
    background: var(--tinta);
    color: var(--hueso);
  }
  .btn-primario:hover{ background:#0f1a1c; }

  .btn-secundario{
    background: var(--panel);
    color: var(--tinta);
    border-color: var(--linea);
  }
  .btn-secundario:hover{ border-color: var(--tinta-suave); }

  .btn-exportar{
    background: var(--ok-bg);
    color: var(--ok);
    border-color: #bcded0;
  }
  .btn-exportar:hover{ background:#d9ecdf; }
  .btn-exportar:disabled{
    opacity: .45;
    cursor: not-allowed;
  }

  .btn-limpiar{
    background: transparent;
    color: var(--critico);
    border-color: #e3c6bd;
  }
  .btn-limpiar:hover{ background: var(--critico-bg); }

  #salida{ margin-top: 28px; }

  .card-error{
    background: var(--critico-bg);
    border: 1px solid #e3b9ac;
    color: #7a2a1c;
    border-radius: 4px;
    padding: 16px;
    font-size: 0.9rem;
  }
  .card-error b{ display:block; font-size:0.78rem; text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }

  .card-advertencias{
    background: var(--alerta-bg);
    border: 1px solid #e6d2a0;
    border-radius: 4px;
    padding: 12px 16px;
    margin-bottom: 18px;
    font-size: 0.82rem;
    color: #6e5117;
  }
  .card-advertencias ul{ margin: 4px 0 0 18px; padding:0; }

  .resumen{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--linea);
    border: 1px solid var(--linea);
    border-radius: 4px;
    overflow:hidden;
    margin-bottom: 22px;
  }

  .resumen .item{
    background: var(--panel);
    padding: 16px 18px;
  }

  .resumen .item .etq{
    font-family: var(--mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--tinta-suave);
    margin-bottom: 6px;
  }

  .resumen .item .val{
    font-size: 1.25rem;
    font-weight: 700;
  }

  .resumen .item.cumplimiento .val{ color: var(--acento); }

  table{
    width:100%;
    border-collapse: collapse;
    background: var(--panel);
    border: 1px solid var(--linea);
    border-radius: 4px;
    overflow: hidden;
    font-size: 0.88rem;
  }

  thead th{
    text-align:left;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--tinta-suave);
    font-weight: 600;
    padding: 12px 14px;
    border-bottom: 2px solid var(--tinta);
    background: var(--panel);
  }

  thead th.num{ text-align:center; }

  tbody td{
    padding: 11px 14px;
    border-bottom: 1px solid var(--linea);
  }

  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background: #faf8f2; }

  td.num{ font-family: var(--mono); text-align:center; }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .pill.completo{ background: var(--ok-bg); color: var(--ok); }
  .pill.parcial{ background: var(--alerta-bg); color: var(--alerta); }
  .pill.critico{ background: var(--critico-bg); color: var(--critico); }
  .pill.sin-pedido{ background:#eee; color:#777; }

  .vacio{
    text-align:center;
    color: var(--tinta-suave);
    font-size: 0.88rem;
    padding: 40px 20px;
    border: 1px dashed var(--linea);
    border-radius: 4px;
  }

  @media (max-width: 640px){
    .resumen{ grid-template-columns: repeat(2,1fr); }
    table, thead, tbody, th, td, tr{ display:block; }
    thead{ display:none; }
    tbody tr{ border-bottom: 2px solid var(--linea); padding: 10px 0; }
    tbody td{ border-bottom:none; display:flex; justify-content:space-between; gap:10px; padding:4px 14px; }
    tbody td.num{ text-align:right; }
    tbody td::before{ content attr(data-col); font-weight:600; color:var(--tinta-suave); }
  }
</style>
</head>
<body>

<header>
  <h1>Procesador de Pedidos</h1>
  <span class="etiqueta-sistema">control de stock</span>
</header>

<div class="panel-entrada">
  <label for="entrada">Datos pegados desde Excel</label>
  <p class="ayuda">Seleccioná el rango en Excel, copiá (Ctrl+C) y pegá aquí (Ctrl+V).</p>
  <textarea id="entrada" placeholder="Cliente&#9;Fecha&#9;Pedido&#9;Modelo&#9;Talle&#9;Disponible&#9;Total_pedido"></textarea>
  <div class="acciones">
    <button class="btn-primario" onclick="procesar()">Procesar pedido</button>
    <button class="btn-exportar" id="btnExportar" onclick="exportarExcel()" disabled>Exportar a Excel</button>
    <button class="btn-limpiar" onclick="limpiarTodo()">Borrar texto</button>
  </div>
</div>

<div id="salida"></div>

<script>
// ===================== A. UTILIDADES =====================
function normalizar(texto) {
  return String(texto == null ? '' : texto)
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .trim();
}

function aNumero(valorCelda) {
  if (valorCelda === null || valorCelda === undefined || valorCelda === '') return { valor: 0, esValido: true };
  if (typeof valorCelda === 'number') return { valor: valorCelda, esValido: !isNaN(valorCelda) };
  let texto = String(valorCelda).trim();
  if (texto === '') return { valor: 0, esValido: true };
  texto = texto.replace(/[^0-9,.\-]/g, '');
  if (texto === '') return { valor: 0, esValido: false };
  if (texto.includes(',') && texto.includes('.')) {
    if (texto.lastIndexOf(',') > texto.lastIndexOf('.')) texto = texto.replace(/\./g, '').replace(',', '.');
    else texto = texto.replace(/,/g, '');
  } else if (texto.includes(',')) {
    texto = texto.replace(',', '.');
  }
  const numero = parseFloat(texto);
  return { valor: isNaN(numero) ? 0 : numero, esValido: !isNaN(numero) };
}

function formatearFecha(texto) {
  const t = String(texto || '').trim();
  const m = t.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (!m) return t;
  let [, d, mes, anio] = m;
  if (anio.length === 2) anio = '20' + anio;
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const idx = parseInt(mes, 10) - 1;
  if (idx < 0 || idx > 11) return t;
  return `${parseInt(d,10)} ${meses[idx]} ${anio}`;
}

// ===================== B. CLASIFICACIÓN DE COLUMNAS =====================
// Importante: se revisa "total" ANTES que "pedido" porque "total_pedido"
// contiene la palabra "pedido" pero representa una CANTIDAD, no el número
// de pedido/orden.
function clasificarColumna(encabezado) {
  const norm = normalizar(encabezado);
  if (!norm) return null;
  if (norm.includes('talle') || norm.includes('talla') || norm.includes('size')) return 'talle';
  if (norm.includes('modelo') || norm.includes('articulo') || norm.includes('producto') || norm.includes('sku')) return 'modelo';
  if (norm.includes('cliente') || norm.includes('razon social')) return 'cliente';
  if (norm.includes('fecha') || norm.includes('date')) return 'fecha';
  if (norm.includes('disponible') || norm.includes('stock') || norm.includes('existencia')) return 'disponible';
  if (norm.startsWith('total') || norm.includes('cantidad') || norm.includes('qty')) return 'cantidadPedida';
  if (norm.includes('pedido') || norm.includes('orden') || norm.includes('comprobante') || norm.includes('nro') || norm.includes('numero')) return 'numeroPedido';
  return null;
}

// ===================== C. PARSEO DE TEXTO PEGADO =====================

// A veces al copiar (desde un PDF, un visor web, etc.) se pierden los
// saltos de línea entre filas y todo queda en una sola línea separada por
// tabs. En ese caso, el último campo de una fila y el primer campo de la
// fila siguiente quedan "fusionados" en un mismo campo, unidos por un
// espacio (ej: "3 LA NUEVA METROPOL S.A."). Esta función detecta ese caso
// y reconstruye los saltos de línea, usando como ancho de fila la
// cantidad de columnas del encabezado.
function reconstruirFilasFusionadas(texto) {
  const lineasOriginales = String(texto || '').split(/\r\n|\r|\n/).filter(l => l.trim() !== '');
  if (lineasOriginales.length > 2) return texto; // ya viene con saltos de línea normales, no tocar

  const sep = lineasOriginales.some(l => l.includes('\t')) ? '\t' : null;
  if (!sep) return texto;

  const campos = lineasOriginales.join(' ').split(sep).map(c => c.trim());
  if (campos.length < 8) return texto;

  // Detectar ancho de fila a partir de cuántas columnas reconoce el encabezado
  const anchoEncabezado = campos.slice(0, 12).filter(c => clasificarColumna(c)).length;
  const ancho = anchoEncabezado >= 4 ? anchoEncabezado : ORDEN_POR_DEFECTO.length;

  // El encabezado (primeros `ancho` campos) puede traer pegado el primer
  // valor de la primera fila de datos en el último campo. Lo separamos
  // igual que el resto, así que arrancamos el proceso desde el campo 0.
  const filasReconstruidas = [];
  let resto = campos.slice();
  let avanzo = true;

  while (resto.length >= ancho && avanzo) {
    avanzo = false;
    const bloque = resto.slice(0, ancho).slice();
    const ultimo = bloque[ancho - 1];

    // Si el siguiente campo existe y el último campo del bloque actual
    // contiene un espacio, significa que ahí está fusionado el primer
    // valor de la fila siguiente. El patrón real es "<total> <cliente...>",
    // así que partimos en el PRIMER espacio (el cliente puede tener
    // varias palabras; el total nunca tiene espacios).
    const idxEspacio = ultimo.indexOf(' ');
    if (idxEspacio > -1) {
      const valorReal = ultimo.slice(0, idxEspacio).trim();
      const inicioSiguiente = ultimo.slice(idxEspacio + 1).trim();
      bloque[ancho - 1] = valorReal;
      filasReconstruidas.push(bloque.join(sep));
      resto = [inicioSiguiente, ...resto.slice(ancho)];
      avanzo = true;
    } else {
      filasReconstruidas.push(bloque.join(sep));
      resto = resto.slice(ancho);
      avanzo = resto.length > 0;
    }
  }

  // Sobrantes (ej. "Total general" final con celdas vacías): se descartan,
  // parsearDatos ya ignora filas sin modelo/talle.
  if (filasReconstruidas.length < 2) return texto;
  return filasReconstruidas.join('\n');
}

function partirEnLineas(texto) {
  return String(texto || '').split(/\r\n|\r|\n/).filter(l => l.trim() !== '');
}

function detectarSeparador(lineas) {
  if (lineas.some(l => l.includes('\t'))) return '\t';
  if (lineas.some(l => l.includes(';'))) return ';';
  // CSV con comas: solo si el conteo de columnas es consistente y > 1
  const conteos = lineas.map(l => l.split(',').length);
  if (lineas.some(l => l.includes(',')) && conteos.every(c => c === conteos[0]) && conteos[0] > 1) return ',';
  return null;
}

const ORDEN_POR_DEFECTO = ['cliente', 'fecha', 'numeroPedido', 'modelo', 'talle', 'disponible', 'cantidadPedida'];

function parsearDatos(textoPegado) {
  const resultado = { ok: false, error: null, registros: [], cabecera: {}, advertencias: [], totales: null, columnasDetectadas: [], huboEncabezado: false };

  const textoReconstruido = reconstruirFilasFusionadas(textoPegado);
  resultado.seReconstruyeronFilas = textoReconstruido !== textoPegado;

  const lineas = partirEnLineas(textoReconstruido);
  if (lineas.length === 0) {
    resultado.error = { tipo: 'vacio', mensaje: 'Pegá filas de datos copiadas desde Excel antes de procesar el pedido.' };
    return resultado;
  }

  const sep = detectarSeparador(lineas);
  if (!sep) {
    resultado.error = {
      tipo: 'sin-separador',
      mensaje: 'No se detectaron columnas separadas por tabulaciones. Copiá las celdas directamente desde Excel (seleccioná el rango y Ctrl+C) y pegalas aquí con Ctrl+V.'
    };
    return resultado;
  }

  const filas = lineas.map(l => l.split(sep).map(c => c.trim()));
  const primerFila = filas[0];
  const clasifPrimerFila = primerFila.map(clasificarColumna);
  const tiposDetectados = clasifPrimerFila.filter(Boolean);
  const tiposUnicos = new Set(tiposDetectados);

  let columnas = {};
  let filasDatos;
  let huboEncabezado = false;

  // Se considera encabezado si al menos 3 columnas distintas fueron
  // identificadas y entre ellas está cliente, modelo o talle (no son
  // valores que aparezcan tipeados así por casualidad en datos reales).
  const pareceEncabezado = tiposUnicos.size >= 3 && (tiposUnicos.has('cliente') || tiposUnicos.has('modelo') || tiposUnicos.has('talle'));

  if (pareceEncabezado) {
    huboEncabezado = true;
    primerFila.forEach((enc, idx) => {
      const tipo = clasificarColumna(enc);
      if (tipo && !(tipo in columnas)) columnas[tipo] = idx;
    });
    filasDatos = filas.slice(1);
  } else if (primerFila.length === ORDEN_POR_DEFECTO.length) {
    // Sin encabezado reconocible, pero la cantidad de columnas coincide
    // con el formato estándar: cliente, fecha, pedido, modelo, talle,
    // disponible, total_pedido (en ese orden).
    ORDEN_POR_DEFECTO.forEach((tipo, idx) => { columnas[tipo] = idx; });
    filasDatos = filas;
  } else {
    resultado.error = {
      tipo: 'sin-encabezado-reconocible',
      mensaje: `No se pudieron identificar las columnas. Se esperaban ${ORDEN_POR_DEFECTO.length} columnas (cliente, fecha, pedido, modelo, talle, disponible, total_pedido) pero se detectaron ${primerFila.length}. Revisá que la primera fila pegada sea el encabezado o los datos en ese orden.`,
      encabezadosVistos: primerFila
    };
    return resultado;
  }

  resultado.columnasDetectadas = Object.keys(columnas);
  resultado.huboEncabezado = huboEncabezado;

  const REQUERIDAS = ['modelo', 'talle', 'disponible', 'cantidadPedida'];
  const faltantes = REQUERIDAS.filter(r => !(r in columnas));
  if (faltantes.length > 0) {
    const NOMBRES = { modelo: 'Modelo', talle: 'Talle', disponible: 'Disponible', cantidadPedida: 'Cantidad pedida / Total pedido', cliente: 'Cliente', fecha: 'Fecha', numeroPedido: 'Número de pedido' };
    resultado.error = {
      tipo: 'columnas-faltantes',
      mensaje: `Faltan columnas obligatorias: ${faltantes.map(f => NOMBRES[f]).join(', ')}.`,
      encabezadosVistos: primerFila
    };
    return resultado;
  }

  // Construir registros
  const registros = [];
  let filasNoNumericas = 0;
  filasDatos.forEach((fila, i) => {
    const get = (tipo) => (tipo in columnas ? (fila[columnas[tipo]] ?? '').trim() : '');
    const modelo = get('modelo');
    const talle = get('talle');
    if (!modelo && !talle) return; // fila vacía

    const resPedida = aNumero(get('cantidadPedida'));
    const resDisp = aNumero(get('disponible'));
    if (!resPedida.esValido || !resDisp.esValido) filasNoNumericas++;

    registros.push({
      id: i,
      cliente: get('cliente'),
      fecha: get('fecha'),
      numeroPedido: get('numeroPedido'),
      modelo,
      talle,
      pedido: resPedida.valor,
      disponible: resDisp.valor
    });
  });

  if (registros.length === 0) {
    resultado.error = { tipo: 'sin-filas', mensaje: 'No se encontraron filas de datos válidas para procesar.' };
    return resultado;
  }

  if (filasNoNumericas > 0) {
    resultado.advertencias.push(`${filasNoNumericas} fila(s) tenían valores no numéricos en Pedido o Disponible; se consideraron como 0.`);
  }

  if (resultado.seReconstruyeronFilas) {
    resultado.advertencias.unshift('El texto pegado no tenía saltos de línea entre filas (común al copiar desde un PDF o visor web); se reconstruyeron automáticamente. Revisá los datos antes de confiar en el resultado.');
  }

  // Cabecera: cliente / pedido / fecha más frecuentes (o primer valor no vacío)
  function valorMasFrecuente(campo) {
    const cuenta = {};
    registros.forEach(r => { if (r[campo]) cuenta[r[campo]] = (cuenta[r[campo]] || 0) + 1; });
    const entradas = Object.entries(cuenta).sort((a, b) => b[1] - a[1]);
    return { valor: entradas.length ? entradas[0][0] : '', distintos: entradas.length };
  }

  const infoCliente = valorMasFrecuente('cliente');
  const infoPedido = valorMasFrecuente('numeroPedido');
  const infoFecha = valorMasFrecuente('fecha');

  if (infoCliente.distintos > 1) resultado.advertencias.push(`Se detectaron ${infoCliente.distintos} clientes distintos en los datos pegados; se muestran todos agregados.`);
  if (infoPedido.distintos > 1) resultado.advertencias.push(`Se detectaron ${infoPedido.distintos} números de pedido distintos; se muestran todos agregados.`);

  resultado.cabecera = {
    cliente: infoCliente.valor || '—',
    numeroPedido: infoPedido.valor || '—',
    fecha: formatearFecha(infoFecha.valor) || '—'
  };

  // Calcular estado por fila
  registros.forEach(r => {
    r.estado = calcularEstado(r.pedido, r.disponible);
  });

  resultado.registros = registros;
  resultado.totales = calcularTotales(registros);
  resultado.ok = true;
  return resultado;
}

// ===================== D. ESTADOS Y TOTALES =====================
function calcularEstado(pedido, disponible) {
  if (pedido <= 0) return { clave: 'sin-pedido', label: 'Sin pedido', icono: '', faltan: 0 };
  if (disponible >= pedido) return { clave: 'completo', label: 'Completo', icono: '✓', faltan: 0 };
  const faltan = pedido - disponible;
  const ratio = disponible / pedido;
  if (ratio >= 0.5) return { clave: 'parcial', label: `Faltan ${faltan}`, icono: '!', faltan };
  return { clave: 'critico', label: `Faltan ${faltan}`, icono: '✕', faltan };
}

function calcularTotales(registros) {
  const totalLineas = registros.length;
  const totalSolicitado = registros.reduce((a, r) => a + r.pedido, 0);
  const totalDisponible = registros.reduce((a, r) => a + r.disponible, 0);
  const totalCubierto = registros.reduce((a, r) => a + Math.min(r.pedido, r.disponible), 0);
  const cumplimiento = totalSolicitado > 0 ? (totalCubierto / totalSolicitado) * 100 : 0;
  return { totalLineas, totalSolicitado, totalDisponible, totalCubierto, cumplimiento };
}

// ===================== E. INTERFAZ =====================
let ultimoResultado = null; // guarda el último resultado procesado para exportar

function escaparHTML(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function procesar(){
  const txt = document.getElementById('entrada').value;
  const res = parsearDatos(txt);
  const out = document.getElementById('salida');
  const btnExportar = document.getElementById('btnExportar');

  if(!res.ok){
    out.innerHTML = `<div class="card-error"><b>No se pudo procesar</b>${escaparHTML(res.error.mensaje)}</div>`;
    ultimoResultado = null;
    btnExportar.disabled = true;
    return;
  }

  ultimoResultado = res;
  btnExportar.disabled = false;

  let html = '';

  if (res.advertencias.length){
    html += `<div class="card-advertencias"><b>Atención</b><ul>${res.advertencias.map(a => `<li>${escaparHTML(a)}</li>`).join('')}</ul></div>`;
  }

  html += `
  <div class="resumen">
    <div class="item"><div class="etq">Cliente</div><div class="val">${escaparHTML(res.cabecera.cliente)}</div></div>
    <div class="item"><div class="etq">Pedido</div><div class="val">${escaparHTML(res.cabecera.numeroPedido)}</div></div>
    <div class="item"><div class="etq">Fecha</div><div class="val">${escaparHTML(res.cabecera.fecha)}</div></div>
    <div class="item cumplimiento"><div class="etq">Cumplimiento</div><div class="val">${res.totales.cumplimiento.toFixed(2)}%</div></div>
  </div>
  <table>
  <thead><tr>
    <th>Modelo</th><th>Talle</th><th>N° Pedido</th><th class="num">Cant. pedida</th><th class="num">Disponible</th><th>Estado</th>
  </tr></thead>
  <tbody>`;

  res.registros.forEach(r => {
    html += `<tr>
      <td data-col="Modelo">${escaparHTML(r.modelo)}</td>
      <td data-col="Talle">${escaparHTML(r.talle)}</td>
      <td data-col="N° Pedido">${escaparHTML(r.numeroPedido || '—')}</td>
      <td data-col="Cant. pedida" class="num">${r.pedido}</td>
      <td data-col="Disponible" class="num">${r.disponible}</td>
      <td data-col="Estado"><span class="pill ${r.estado.clave}">${r.estado.icono ? r.estado.icono + ' ' : ''}${escaparHTML(r.estado.label)}</span></td>
    </tr>`;
  });

  html += '</tbody></table>';
  out.innerHTML = html;
}

function limpiarTodo(){
  document.getElementById('entrada').value = '';
  document.getElementById('salida').innerHTML = '<div class="vacio">Pegá datos y presioná «Procesar pedido» para ver el resultado.</div>';
  document.getElementById('btnExportar').disabled = true;
  ultimoResultado = null;
  document.getElementById('entrada').focus();
}

function exportarExcel(){
  if (!ultimoResultado) return;
  const res = ultimoResultado;

  const filas = res.registros.map(r => ({
    'Modelo': r.modelo,
    'Talle': r.talle,
    'N° Pedido': r.numeroPedido,
    'Cant. pedida': r.pedido,
    'Disponible': r.disponible,
    'Estado': r.estado.label
  }));

  const hoja = XLSX.utils.json_to_sheet(filas);
  hoja['!cols'] = [{wch:18},{wch:10},{wch:12},{wch:12},{wch:12},{wch:16}];

  const libro = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(libro, hoja, 'Pedido');

  // Hoja de resumen
  const resumen = [
    { Campo: 'Cliente', Valor: res.cabecera.cliente },
    { Campo: 'Pedido', Valor: res.cabecera.numeroPedido },
    { Campo: 'Fecha', Valor: res.cabecera.fecha },
    { Campo: 'Líneas', Valor: res.totales.totalLineas },
    { Campo: 'Total solicitado', Valor: res.totales.totalSolicitado },
    { Campo: 'Total disponible', Valor: res.totales.totalDisponible },
    { Campo: 'Total cubierto', Valor: res.totales.totalCubierto },
    { Campo: 'Cumplimiento (%)', Valor: Number(res.totales.cumplimiento.toFixed(2)) }
  ];
  const hojaResumen = XLSX.utils.json_to_sheet(resumen, { skipHeader: true });
  hojaResumen['!cols'] = [{wch:18},{wch:20}];
  XLSX.utils.book_append_sheet(libro, hojaResumen, 'Resumen');

  const nombreCliente = (res.cabecera.cliente || 'pedido').replace(/[^a-z0-9áéíóúñ]+/gi, '_');
  const nombrePedido = (res.cabecera.numeroPedido || '').replace(/[^a-z0-9áéíóúñ]+/gi, '_');
  const nombreArchivo = `pedido_${nombreCliente}${nombrePedido ? '_' + nombrePedido : ''}.xlsx`;

  XLSX.writeFile(libro, nombreArchivo);
}

// Estado inicial
document.getElementById('salida').innerHTML = '<div class="vacio">Pegá datos y presioná «Procesar pedido» para ver el resultado.</div>';
</script>
